version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME:-relievv_db}
      - DB_USER=${DB_USER:-relievv_user}
      - DB_PASS=${DB_PASS:-vishal@31#}
      - DB_PORT=3306
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      - mysql
    volumes:
      - uploads:/var/www/html/uploads
    networks:
      - relievv-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${DB_NAME:-relievv_db}
      MYSQL_USER: ${DB_USER:-relievv_user}
      MYSQL_PASSWORD: ${DB_PASS:-relievv_password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - relievv-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local
  uploads:
    driver: local

networks:
  relievv-network:
    driver: bridge
